name: flutter_nexus
description: Nexus - Geo-Contextual News Platform
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  dio: ^5.7.0                        # HTTP client with interceptor support (auth, retries)
  google_sign_in: ^6.2.2             # Google OAuth — retrieves ID token on device
  flutter_secure_storage: ^9.2.2     # Encrypted local storage for access/refresh tokens

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
